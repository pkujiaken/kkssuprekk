name: Daily Brief

on:
  schedule:
    # 北京时间 07:30 / 12:30 / 20:30 (UTC -8h)
    - cron: '30 23 * * *'  # 07:30 BJT
    - cron: '30 4 * * *'   # 12:30 BJT
    - cron: '30 12 * * *'  # 20:30 BJT
  workflow_dispatch:  # 允许从网页手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS
        run: python scripts/fetch.py

      - name: Process with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/process.py

      - name: Generate HTML
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
